  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]

    steps:
      - name: Enviar alerta para Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content": "Deploy feito com sucesso no projeto da Lari "}' \
          ${{ secrets.DISCORD_WEBHOOK }}
